name: Build

# Builds the VTM solution on every push / PR to main. This is a .NET Framework 4.8
# WPF solution with a MIX of packages.config (VTMBase / VTMTester / VTMReport) and
# PackageReference (VTMControls / VTMUtility) projects, so it needs BOTH a nuget restore
# (packages.config -> solution `packages\` folder) and an msbuild restore
# (PackageReference -> global NuGet cache, which is also where VTMTester's Sdcb
# PaddleOCR native props Import expects the 3.0.0.51 runtime).
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest   # required: .NET Framework + WPF + full MSBuild

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      # packages.config projects (VTMBase / VTMTester / VTMReport)
      - name: NuGet restore (packages.config)
        run: nuget restore VTM.sln

      # PackageReference projects (VTMControls / VTMUtility) + Sdcb native to the global cache
      - name: MSBuild restore (PackageReference)
        run: msbuild VTM.sln -t:Restore -p:Configuration=Debug

      - name: Build (Debug)
        run: msbuild VTM.sln -t:Build -p:Configuration=Debug -m
